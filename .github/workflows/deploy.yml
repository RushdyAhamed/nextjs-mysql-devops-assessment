name: Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.251.28.241
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # Ensure Docker is available
            docker --version
            docker compose version

            # Clone if not exists
            if [ ! -d "nextjs-mysql-example" ]; then
              git clone https://github.com/RushdyAhamed/nextjs-mysql-devops-assessment.git nextjs-mysql-example
            fi

            cd nextjs-mysql-example

            # Clean and sync repo
            git fetch --all
            git reset --hard origin/main

            # Rebuild containers
            docker compose down
            docker compose up -d --build --remove-orphans